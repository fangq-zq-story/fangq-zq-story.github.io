<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{{ .Title }}</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f9f9f9; }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            grid-gap: 15px;
            padding: 20px;
        }
        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .gallery-item img:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <h1>{{ .Title }}</h1>
    <div class="gallery-grid">
        {{ $files := readDir "static/images" }}
        {{ range $files }}
            {{ if (resources.Get (printf "images/%s" .Name)) }} {{ end }}
            <div class="gallery-item">
                <img src="/images/{{ .Name }}" alt="{{ .Name }}">
            </div>
        {{ end }}
    </div>
</body>
</html>
