<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我们的时光印记 (v3)</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.css"/>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        :root { --primary-pink: #ff7675; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-image: linear-gradient(to top, #fbc2eb 0%, #a6c1ee 100%);
            background-attachment: fixed;
            min-height: 100vh;
            font-family: sans-serif; /* 使用系统默认字体，最快 */
            color: #555;
            padding: 40px 15px;
            overflow-x: hidden;
            position: relative;
        }

        /* ❌ 删除了所有 loader 相关样式 */

        /* 简单的标题样式 */
        header { text-align: center; margin-bottom: 50px; position: relative; z-index: 10; }
        h1 { 
            font-size: 3rem; 
            color: #fff; 
            margin-bottom: 10px; 
            text-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .subtitle { 
            font-size: 1.2rem; 
            color: #fff; 
            opacity: 0.9; 
        }
        #love-timer { 
            font-size: 1.1rem; 
            color: #ff7675; 
            background: rgba(255,255,255,0.95); 
            padding: 10px 30px; 
            border-radius: 50px; 
            display: inline-block; 
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
        }

        /* 瀑布流布局 */
        .gallery-grid { 
            column-count: 2; /* 手机默认2列 */
            column-gap: 15px; 
            max-width: 1400px; 
            margin: 0 auto; 
            position: relative; 
            z-index: 10; 
        }
        @media (min-width: 768px) { .gallery-grid { column-count: 4; } }
        
        .gallery-item { 
            break-inside: avoid; 
            margin-bottom: 15px; 
            background-color: #fff; padding: 10px; border-radius: 8px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            display: flex; flex-direction: column; align-items: center;
        }
        
        .gallery-item img { 
            width: 100%; height: auto; display: block; 
            border-radius: 4px;
            cursor: zoom-in; 
        }

        .photo-caption-text {
            font-size: 1rem; color: #555; 
            text-align: center; margin-top: 8px; width: 100%;
        }

        /* 底部功能区 */
        #dm-input-area {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 10001; display: flex; align-items: center;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            padding: 8px 8px 8px 20px; border-radius: 50px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            width: 90%; max-width: 400px;
        }
        #dm-input { border: none; background: transparent; outline: none; font-size: 1rem; flex: 1; }
        #dm-btn { background: #ff7675; color: white; border: none; padding: 8px 20px; border-radius: 30px; margin-left: 10px; cursor: pointer; }

        /* 悬浮按钮 */
        #comment-toggle-btn {
            position: fixed; bottom: 90px; right: 20px;
            width: 45px; height: 45px;
            background: #ff7675; color: white;
            border-radius: 50%;
            display: none; 
            align-items: center; justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 15px rgba(255, 118, 117, 0.4);
            z-index: 100000;
            cursor: pointer;
        }

        /* 侧边栏 */
        #photo-comment-sidebar {
            position: fixed; top: 0; right: 0; width: 100%; height: 50%; /* 手机默认半屏 */
            top: auto; bottom: 0;
            background: rgba(255, 255, 255, 0.98);
            z-index: 999999; 
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
            transform: translateY(100%); transition: transform 0.3s ease;
            display: flex; flex-direction: column;
            border-radius: 20px 20px 0 0;
        }
        @media (min-width: 768px) {
            #photo-comment-sidebar { width: 350px; height: 100%; top: 0; bottom: auto; transform: translateX(100%); border-radius: 0; }
            #photo-comment-sidebar.show { transform: translateX(0); }
        }
        #photo-comment-sidebar.show { transform: translateY(0); }

        .sidebar-header { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .sidebar-header span { color: #ff7675; font-weight: bold; font-size: 1.1rem; }
        .close-sidebar { font-size: 1.5rem; color: #999; padding: 5px; cursor: pointer; }
        #sidebar-comment-list { flex: 1; overflow-y: auto; padding: 15px; }
        .sidebar-input-area { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        #sidebar-input { flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 8px 15px; outline: none; }
        #sidebar-btn { background: #ff7675; color: white; border: none; padding: 5px 15px; border-radius: 20px; }
        .sidebar-comment-item { margin-bottom: 15px; background: #f9f9f9; padding: 10px; border-radius: 8px; }
        
        /* 弹幕和留言墙 */
        #danmaku-container { position: fixed; top: 0; left: 0; width: 100%; height: 60%; pointer-events: none; z-index: 99; overflow: hidden; }
        .danmaku-item { position: absolute; white-space: nowrap; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); font-size: 1.2rem; animation: dmRun 10s linear forwards; }
        @keyframes dmRun { from { transform: translateX(100vw); } to { transform: translateX(-100%); } }

        #message-board-section { padding: 20px; margin-bottom: 80px; }
        .message-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .message-card { background: rgba(255,255,255,0.8); padding: 10px 20px; border-radius: 20px; font-size: 0.9rem; }

        .float-btn { position: fixed; top: 20px; padding: 5px 15px; background: rgba(255,255,255,0.8); border-radius: 20px; cursor: pointer; z-index: 200; font-size: 0.8rem; }
        #login-trigger { right: 20px; }
        #upload-trigger { left: 20px; display: none; background: #a18cd1; color: white; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; display: none; justify-content: center; align-items: center; }
        .modal-box { background: #fff; padding: 30px; border-radius: 10px; width: 300px; text-align: center; position: relative; }
        .modal-input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .modal-btn { width: 100%; padding: 10px; background: #ff7675; color: white; border: none; border-radius: 5px; }
        .close-modal { position: absolute; top: 10px; right: 10px; cursor: pointer; }

        #music-btn { position: fixed; bottom: 90px; right: 20px; width: 40px; height: 40px; background: #ff7675; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; cursor: pointer; z-index: 100; }
        .music-playing { animation: spin 3s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="danmaku-container"></div>
    
    <div id="comment-toggle-btn" onclick="openSidebarManually()">💬</div>

    <div id="photo-comment-sidebar">
        <div class="sidebar-header">
            <span>📷 瞬间评论</span>
            <div class="close-sidebar" onclick="closeSidebarManually()">×</div>
        </div>
        <div id="sidebar-comment-list">
            <div style="text-align:center; color:#999; margin-top:20px;">加载中...</div>
        </div>
        <div class="sidebar-input-area">
            <input type="text" id="sidebar-input" placeholder="说说这张照片..." maxlength="50" autocomplete="off">
            <button id="sidebar-btn" onclick="postSidebarComment()">发送</button>
        </div>
    </div>

    <div id="login-trigger" class="float-btn" onclick="toggleModal('login-modal')">🔒 管理员</div>
    <div id="upload-trigger" class="float-btn" onclick="toggleModal('upload-modal')">📷 上传照片</div>

    <div id="login-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="close-modal" onclick="toggleModal('login-modal')">×</div>
            <h3>管理员登录</h3>
            <input type="text" id="username" class="modal-input" placeholder="账号">
            <input type="password" id="password" class="modal-input" placeholder="密码">
            <button class="modal-btn" onclick="restLogin()">登录</button>
        </div>
    </div>

    <div id="upload-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="close-modal" onclick="toggleModal('upload-modal')">×</div>
            <h3>添加美好瞬间</h3>
            <input type="file" id="photo-file" class="modal-input" accept="image/*">
            <input type="text" id="photo-caption" class="modal-input" placeholder="写一句好看的批注吧">
            <button class="modal-btn" id="upload-btn-action" onclick="uploadPhoto()">☁️ 上传到云相册</button>
        </div>
    </div>

    <div id="edit-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="close-modal" onclick="toggleModal('edit-modal')">×</div>
            <h3>修改批注</h3>
            <input type="hidden" id="edit-photo-id">
            <input type="text" id="edit-photo-caption" class="modal-input" placeholder="输入新的批注...">
            <button class="modal-btn" onclick="confirmEditPhoto()">💾 保存修改</button>
        </div>
    </div>

    <div id="dm-input-area">
        <input type="text" id="dm-input" placeholder="写下你的comments" maxlength="30">
        <button id="dm-btn">发送 ❤️</button>
    </div>

    <header>
        <h1>{{ .Title }}</h1>
        <p class="subtitle">记录我们的每一个瞬间</p>
        <div id="love-timer">Loading...</div>
    </header>

    <div class="gallery-grid" id="gallery-grid">
        {{ $files := readDir "static/images" }}
        {{ range $files }}
            <div class="gallery-item">
                <a href="/images/{{ .Name }}" data-fancybox="gallery" data-caption="">
                    <img src="/images/{{ .Name }}" alt="" loading="lazy">
                </a>
            </div>
        {{ end }}
    </div>

    <div id="message-board-section">
        <div class="board-title" style="text-align:center; color:white; font-size:1.5rem; margin-bottom:20px;">✨ 爱的留言墙 ✨</div>
        <div class="message-list" id="message-list">
            <div class="message-card">Loading...</div>
        </div>
    </div>

    <footer>
        <p>Made with Love ❤️ For You</p>
    </footer>

    <div id="music-btn">🎵</div>
    <audio id="bg-audio" src="/music/love.mp3" loop></audio>

    <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.umd.js"></script>
    
    <script>
        const APP_ID = '1bb3a23f54f31dadc50f15ce6608a9f5'; 
        const REST_KEY = 'b5264160f632cf6751a59de9e3e966b1';
        const BASE_URL = 'https://api.bmobcloud.com/1';
        const PHOTO_TABLE = 'Photo';
        const COMMENT_TABLE = 'Comment';
        const IMGBB_KEY = '4a29896ebe2442bb3af8ac1e1e6e1453';

        let isUserAdmin = false; let currentUser = null;
        let displayedMessageIds = new Set(); 
        let currentPhotoId = null;
        let photoCommentInterval = null;

        // ✅ 使用 DOMContentLoaded 立即执行，不等资源加载
        document.addEventListener('DOMContentLoaded', () => {
            checkLocalLogin(); 
            loadCloudMessages(); 
            loadCloudPhotos(); 
            startRandomAtmosphere(); 
            initTypewriter();
            setupMusic();
        });

        // 阻止冒泡
        document.getElementById('sidebar-input').addEventListener('keydown', (e) => e.stopPropagation());
        document.getElementById('photo-comment-sidebar').addEventListener('click', (e) => e.stopPropagation());
        document.getElementById('comment-toggle-btn').addEventListener('click', (e) => e.stopPropagation());

        function bmobRequest(endpoint, method, body=null) {
            const headers = { 'X-Bmob-Application-Id': APP_ID, 'X-Bmob-REST-API-Key': REST_KEY, 'Content-Type': 'application/json' };
            if(localStorage.getItem('bmob_session')) headers['X-Bmob-Session-Token'] = localStorage.getItem('bmob_session');
            const config = { method: method, headers: headers };
            if(body) config.body = JSON.stringify(body);
            return fetch(BASE_URL + endpoint, config).then(res => res.json());
        }

        function toggleModal(id) {
            const modal = document.getElementById(id);
            if(id === 'login-modal' && currentUser) {
                if(confirm("确定退出登录吗？")) { localStorage.removeItem('bmob_user'); localStorage.removeItem('bmob_session'); location.reload(); }
            } else {
                modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
            }
        }

        function uploadPhoto() {
            const file = document.getElementById('photo-file').files[0];
            const caption = document.getElementById('photo-caption').value.trim() || "美好的瞬间";
            if(!file) { alert("请选择照片"); return; }
            
            const btn = document.getElementById('upload-btn-action'); 
            btn.innerText = "⏳ 上传中..."; btn.disabled = true;

            const formData = new FormData(); formData.append("image", file);
            fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: formData })
            .then(res => res.json())
            .then(imgData => {
                if(!imgData.success) throw new Error("上传失败");
                return bmobRequest(`/classes/${PHOTO_TABLE}`, 'POST', { url: imgData.data.url, caption: caption, order: Date.now() });
            })
            .then(() => { alert("✨ 成功！"); location.reload(); })
            .catch(e => { alert("失败: " + e.message); btn.innerText = "☁️ 上传"; btn.disabled = false; });
        }

        function loadCloudPhotos() {
            bmobRequest(`/classes/${PHOTO_TABLE}?order=order,-createdAt&limit=500`, 'GET').then(data => {
                if(data.results && data.results.length > 0) {
                    const gallery = document.getElementById('gallery-grid');
                    gallery.innerHTML = ''; 
                    data.results.forEach(photo => {
                        if(!photo.url) return;
                        let safeUrl = photo.url.replace('http://', 'https://');
                        const div = document.createElement('div'); div.className = 'gallery-item'; div.setAttribute('data-id', photo.objectId);
                        let controls = isUserAdmin ? `<div style="position:absolute;top:5px;right:5px;z-index:99" onclick="deletePhoto('${photo.objectId}', this)">🗑️</div>` : '';
                        div.innerHTML = `${controls}<a href="${safeUrl}" data-fancybox="gallery" data-caption="${photo.caption}" data-id="${photo.objectId}"><img src="${safeUrl}" loading="lazy"></a><div class="photo-caption-text">${photo.caption}</div>`;
                        gallery.appendChild(div);
                    });
                    
                    Fancybox.bind("[data-fancybox]", { 
                        Toolbar: { display: { right: ["close"] } },
                        autoFocus: false, trapFocus: false, placeFocusBack: false,
                        on: {
                            "Carousel.ready": (fancybox) => { 
                                document.getElementById('dm-input-area').classList.add('hide-input'); 
                                const slide = fancybox.getSlide();
                                if(slide && slide.triggerEl) showPhotoSidebar(slide.triggerEl.dataset.id);
                            },
                            "Carousel.change": (fancybox) => {
                                const currentSlide = fancybox.getSlide();
                                if(currentSlide && currentSlide.triggerEl) {
                                    const pid = currentSlide.triggerEl.dataset.id;
                                    if(pid !== currentPhotoId) { document.getElementById('sidebar-input').value = ''; updateSidebarContent(pid); }
                                }
                            },
                            "close": () => { document.getElementById('dm-input-area').classList.remove('hide-input'); closeSidebarCompletely(); }
                        }
                    });
                }
            });
        }

        function showPhotoSidebar(pid) {
            currentPhotoId = pid;
            document.getElementById('photo-comment-sidebar').classList.add('show');
            document.getElementById('comment-toggle-btn').style.display = 'none';
            loadPhotoComments(pid);
            if(photoCommentInterval) clearInterval(photoCommentInterval);
            photoCommentInterval = setInterval(() => { if(currentPhotoId) loadPhotoComments(currentPhotoId); }, 4000);
        }
        function closeSidebarManually() { document.getElementById('photo-comment-sidebar').classList.remove('show'); document.getElementById('comment-toggle-btn').style.display = 'flex'; }
        function openSidebarManually() { document.getElementById('photo-comment-sidebar').classList.add('show'); document.getElementById('comment-toggle-btn').style.display = 'none'; }
        function closeSidebarCompletely() { document.getElementById('photo-comment-sidebar').classList.remove('show'); document.getElementById('comment-toggle-btn').style.display = 'none'; currentPhotoId = null; }
        function updateSidebarContent(pid) { currentPhotoId = pid; document.getElementById('sidebar-comment-list').innerHTML = '<div style="text-align:center;color:#999;margin-top:20px;">加载中...</div>'; loadPhotoComments(pid); }

        function loadPhotoComments(pid) {
            const where = JSON.stringify({ "photoId": pid });
            bmobRequest(`/classes/${COMMENT_TABLE}?where=${encodeURIComponent(where)}&order=-createdAt`, 'GET').then(data => {
                const list = document.getElementById('sidebar-comment-list');
                if(!data.results || data.results.length === 0) { list.innerHTML = '<div style="text-align:center;color:#999;margin-top:20px;">暂无评论</div>'; return; }
                let html = '';
                data.results.forEach(c => {
                    let del = isUserAdmin ? `<span onclick="deletePhotoComment('${c.objectId}')" style="float:right;color:red;cursor:pointer">×</span>` : '';
                    html += `<div class="sidebar-comment-item">${del}<div style="font-size:0.9rem">${c.content}</div><div style="font-size:0.7rem;color:#ccc;text-align:right">${c.createdAt.split(' ')[0]}</div></div>`;
                });
                list.innerHTML = html;
            });
        }

        function postSidebarComment() {
            const input = document.getElementById('sidebar-input');
            const val = input.value.trim();
            if(!val || !currentPhotoId) return;
            bmobRequest(`/classes/${COMMENT_TABLE}`, 'POST', { content: val, photoId: currentPhotoId }).then(() => {
                input.value = ''; input.focus(); loadPhotoComments(currentPhotoId);
            });
        }
        window.deletePhotoComment = function(cid) { if(confirm("删除?")) bmobRequest(`/classes/${COMMENT_TABLE}/${cid}`, 'DELETE').then(() => loadPhotoComments(currentPhotoId)); }
        window.deletePhoto = function(id, el) { if(confirm("删除照片?")) bmobRequest(`/classes/${PHOTO_TABLE}/${id}`, 'DELETE').then(() => el.parentElement.remove()); }

        function checkLocalLogin() {
            const savedUser = localStorage.getItem('bmob_user');
            if(savedUser) {
                currentUser = JSON.parse(savedUser);
                if(currentUser.username === 'fangq' || currentUser.isAdmin) {
                    isUserAdmin = true; 
                    document.getElementById('upload-trigger').style.display = 'block';
                    initAdminDrag();
                }
                document.getElementById('login-trigger').innerText = "👤 " + currentUser.username;
            }
        }
        function restLogin() {
            const u = document.getElementById('username').value, p = document.getElementById('password').value;
            bmobRequest(`/login?username=${u}&password=${p}`, 'GET').then(res => {
                localStorage.setItem('bmob_user', JSON.stringify(res)); localStorage.setItem('bmob_session', res.sessionToken);
                alert('登录成功！'); location.reload();
            }).catch(e => alert('失败'));
        }

        function initTypewriter() {
            const subtitle = document.querySelector('.subtitle'); const text = "记录我们的每一个瞬间"; subtitle.innerText = text;
        }
        
        function loadCloudMessages() {
            bmobRequest('/classes/Danmaku?order=-createdAt&limit=50', 'GET').then(data => {
                const list = document.getElementById('message-list'); 
                if (data.results && data.results.length > 0) {
                    let html = '';
                    data.results.forEach(item => {
                        shootDanmaku(item.content);
                        html += `<div class="message-card">${item.content}</div>`;
                    });
                    list.innerHTML = html;
                } else {
                    list.innerHTML = '暂无留言';
                }
            });
        }

        const dmContainer = document.getElementById('danmaku-container'), dmInput = document.getElementById('dm-input'), dmBtn = document.getElementById('dm-btn');
        function shootDanmaku(text) {
            const dm = document.createElement('div'); dm.innerText = text; dm.className = 'danmaku-item';
            dm.style.top = (Math.floor(Math.random() * 60) + 5) + '%'; 
            dmContainer.appendChild(dm); setTimeout(() => dm.remove(), 10000);
        }
        dmBtn.onclick = () => { const t = dmInput.value.trim(); if(t) { shootDanmaku(t); bmobRequest('/classes/Danmaku', 'POST', { content: t }); dmInput.value = ''; } };

        function updateTimer() {
            const diff = new Date() - new Date("2023-08-21T00:00:00");
            document.getElementById("love-timer").innerHTML = `在一起 ${Math.floor(diff / 86400000)} 天了 ❤️`;
        }
        setInterval(updateTimer, 1000); updateTimer();

        function setupMusic() {
            const btn = document.getElementById('music-btn'), audio = document.getElementById('bg-audio'); let isPlaying = false;
            btn.onclick = () => { if (isPlaying) { audio.pause(); btn.classList.remove('music-playing'); } else { audio.play(); btn.classList.add('music-playing'); } isPlaying = !isPlaying; };
        }
        function startRandomAtmosphere() {
            const presets = ["❤️", "✨", "永远开心", "Love", "🌹"];
            setInterval(() => { shootDanmaku(presets[Math.floor(Math.random() * presets.length)]); }, 3000);
        }
        function initAdminDrag() {
            new Sortable(document.getElementById('gallery-grid'), { animation: 150 });
        }
    </script>
</body>
</html>
